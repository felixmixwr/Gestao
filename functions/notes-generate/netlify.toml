[build]
  command = "npm install"
  functions = "."

[functions."index.js"]
  included_files = ["templates/**", "public/**", "lib/**"]

[[redirects]]
  from = "/api/notes/generate"
  to = "/.netlify/functions/index"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/index"
  status = 200

[build.environment]
  NODE_VERSION = "18"
  SUPABASE_BUCKET_INVOICES = "invoices"
